name: Laravel CI

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Build containers
      run: docker compose build

    - name: Start containers
      run: docker compose up -d

    - name: Run migrations
      run: docker compose exec -T laravel php artisan migrate